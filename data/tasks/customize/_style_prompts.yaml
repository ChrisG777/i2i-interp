# Style-transfer subjects + 5 prompts per subject. Edited freely.
# scripts/fix_style_after_yaml_edit.py reads from here.
# Each subject must have exactly 5 prompts. Subject ordering is alphabetical.
#
# Reference images live at:
#   illustration: data/style_references/fictional/<subject>.{jpg,png}
#   real photo:   data/style_references/real/<subject>_real.{jpg,jpeg,png}
#
# Subject-kind is implicit in each prompt's "the {kind} in this image" wording.
# Animals use the species name; humans use boy/girl/man/woman/...

_version: free

